name: Validar y publicar actividades

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3

      - name: Instalar AulaStep
        # Instala la herramienta desde tu repositorio de AulaStep.
        # Cambia sgalsant por tu usuario de GitHub.
        run: |
          uv venv
          uv pip install "aulastep @ git+https://github.com/sgalsant/aulastep"

      - name: Validar y compilar todas las actividades
        run: uv run aulastep publish actividades --output _site --clean --title "Actividades · Santiago Galván"

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
